<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Parser</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        #copyButton {
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <input type="file" id="fileInput" multiple>
    <input type="text" id="tagInput" placeholder="Enter tag name">
    <button id="parseButton">Parse XML</button>
    <button id="copyButton" onclick="copyTable()">Copy Data</button>
    <table id="resultTable">
        <thead>
            <tr>
                <th>File Name</th>
                <th>Tag</th>
                <th>Content</th>
                <th>Path</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        document.getElementById('parseButton').addEventListener('click', handleFiles, false);

        function handleFiles() {
            const files = document.getElementById('fileInput').files;
            const tag = document.getElementById('tagInput').value;
            if (!tag) {
                alert("Please enter a tag name.");
                return;
            }
            const resultTable = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
            resultTable.innerHTML = ''; // Clear previous results

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const xmlText = e.target.result;
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "application/xml");
                    const data = extractDataFromXML(xmlDoc, tag);
                    data.forEach(({content, path}) => {
                        const row = resultTable.insertRow();
                        row.insertCell(0).innerText = file.name;
                        row.insertCell(1).innerText = tag;
                        row.insertCell(2).innerText = content;
                        row.insertCell(3).innerText = path;
                    });
                };
                reader.readAsText(file);
            });

            document.getElementById('copyButton').style.display = 'inline'; // Show copy button
        }

        function extractDataFromXML(xmlDoc, tag) {
            const elements = xmlDoc.getElementsByTagName(tag);
            const extractedData = [];
            for (let i = 0; i < elements.length; i++) {
                const element = elements[i];
                const path = getXPath(element);
                extractedData.push({
                    content: element.textContent,
                    path: path
                });
            }
            return extractedData;
        }

        function getXPath(element) {
            if (element.id !== '') {
                return 'id("' + element.id + '")';
            }
            if (element === document.body) {
                return element.tagName;
            }

            let ix = 0;
            const siblings = element.parentNode.childNodes;
            for (let i = 0; i < siblings.length; i++) {
                const sibling = siblings[i];
                if (sibling === element) {
                    return getXPath(element.parentNode) + '/' + element.tagName + '[' + (ix + 1) + ']';
                }
                if (sibling.nodeType === 1 && sibling.tagName === element.tagName) {
                    ix++;
                }
            }
            return '';
        }

        function copyTable() {
            const range = document.createRange();
            const table = document.getElementById('resultTable');
            range.selectNode(table);
            window.getSelection().removeAllRanges(); // Clear current selection
            window.getSelection().addRange(range); // Select the table
            document.execCommand('copy'); // Copy the selection to clipboard
            window.getSelection().removeAllRanges(); // Unselect the table
            alert('Data copied to clipboard');
        }
    </script>
</body>
</html>
