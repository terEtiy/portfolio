<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анализ задач ГПЗУ - Расширенная версия</title>
    <link rel="stylesheet" href="/static/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-chart-bar"></i> Мониторинг задач V2</h1>
        <div class="path-selector">
          <input type="text" id="folderPath" placeholder="Путь к папке ГПЗУ" value="C:\Users\kadymskiy_ns\Desktop\ГПЗУ" />
          <button id="analyzeBtn" class="btn-primary"><i class="fas fa-search"></i> Анализировать</button>
        </div>
        <div id="suggestions" class="suggestions"></div>
      </header>

      <div id="loading" class="loading" style="display: none">
        <div class="spinner"></div>
        <p>Анализируем структуру папок...</p>
      </div>

      <div id="error" class="error" style="display: none"></div>

      <!-- Панель фильтров -->
      <div id="filtersPanel" class="filters-panel" style="display: none">
        <h3><i class="fas fa-filter"></i> Фильтры</h3>
        <div class="filters-grid">
          <div class="filter-group">
            <label>Дата:</label>
            <select id="dateFilter" class="filter-select">
              <option value="all">Все даты</option>
            </select>
          </div>
          <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> Месяц:</label>
            <select id="monthFilter" class="filter-select">
              <option value="all">Все месяцы</option>
              <option value="1">Январь</option>
              <option value="2">Февраль</option>
              <option value="3">Март</option>
              <option value="4">Апрель</option>
              <option value="5">Май</option>
              <option value="6">Июнь</option>
              <option value="7">Июль</option>
              <option value="8">Август</option>
              <option value="9">Сентябрь</option>
              <option value="10">Октябрь</option>
              <option value="11">Ноябрь</option>
              <option value="12">Декабрь</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Статус БР:</label>
            <select id="brStatusFilter" class="filter-select">
              <option value="all">Все</option>
              <option value="Загружено из БР">Загружено из БР</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Геоанализ:</label>
            <select id="geoStatusFilter" class="filter-select">
              <option value="all">Все</option>
              <option value="В работу">В работу</option>
              <option value="Отказ">Отказ</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Проект:</label>
            <select id="projectStatusFilter" class="filter-select">
              <option value="all">Все</option>
              <option value="Подготовлен">Подготовлен</option>
              <option value="Проект не подготовлен">Не подготовлен</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Чертеж:</label>
            <select id="drawingStatusFilter" class="filter-select">
              <option value="all">Все</option>
              <option value="Подготовлен">Подготовлен</option>
              <option value="Чертеж не подготовлен">Не подготовлен</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Поиск по номеру:</label>
            <input type="text" id="searchInput" placeholder="№ задачи..." class="filter-input" />
          </div>
        </div>
        <div class="filter-actions">
          <button id="applyFiltersBtn" class="btn-success"><i class="fas fa-check"></i> Применить</button>
          <button id="resetFiltersBtn" class="btn-secondary"><i class="fas fa-undo"></i> Сбросить</button>
        </div>
      </div>

      <!-- Статистика -->
      <div id="stats" class="stats" style="display: none">
        <div class="stat-card">
          <i class="fas fa-tasks"></i>
          <span class="stat-label">Всего задач:</span>
          <span class="stat-value" id="totalTasks">0</span>
        </div>
        <div class="stat-card">
          <i class="fas fa-check-circle" style="color: #27ae60"></i>
          <span class="stat-label">Загружено из БР:</span>
          <span class="stat-value" id="brLoaded">0</span>
        </div>
        <div class="stat-card">
          <i class="fas fa-hard-hat" style="color: #2980b9"></i>
          <span class="stat-label">Геоанализ в работе:</span>
          <span class="stat-value" id="geoWork">0</span>
        </div>
        <div class="stat-card">
          <i class="fas fa-file-pdf" style="color: #e74c3c"></i>
          <span class="stat-label">Чертежи готовы:</span>
          <span class="stat-value" id="drawingsReady">0</span>
        </div>
        <div class="stat-card">
          <i class="fas fa-times-circle" style="color: #c0392b"></i>
          <span class="stat-label">Отказы:</span>
          <span class="stat-value" id="rejectCount">0</span>
        </div>
      </div>

      <!-- Панель группировки -->
      <div id="groupingPanel" class="grouping-panel" style="display: none">
        <div class="grouping-controls">
          <label><i class="fas fa-layer-group"></i> Группировка:</label>
          <select id="groupBySelect" class="group-select">
            <option value="none">Без группировки</option>
            <option value="date">По дате</option>
            <option value="geo_status">По статусу геоанализа</option>
            <option value="project_status">По статусу проекта</option>
            <option value="drawing_status">По статусу чертежа</option>
          </select>
          <button id="exportBtn" class="btn-export"><i class="fas fa-download"></i> Экспорт в CSV</button>
        </div>
      </div>

      <!-- Таблица с данными -->
      <div id="tableContainer" style="display: none">
        <table id="tasksTable">
          <thead>
            <tr>
              <th class="sortable" data-sort="date">Дата <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="task_number">№ Задачи <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="br_status">Статус БР <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="geo_status">Геоанализ <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="project_status">Проект чертежа <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="drawing_status">Чертеж pdf <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="reference_status">Справка <i class="fas fa-sort"></i></th>
              <th class="sortable" data-sort="note">Примечание <i class="fas fa-sort"></i></th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- Модальное окно для деталей задачи -->
      <div id="taskModal" class="modal" style="display: none">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2>Детали задачи</h2>
          <div id="modalBody"></div>
        </div>
      </div>
    </div>

    <script src="/static/index.js"></script>
  </body>
</html>
